id: conference-intelligence
name: AI Conference Intelligence
type: scrape
config:
  base_url: https://aievents.org/events
  selectors:
    container: ".event-card"
    title: ".event-title"
    link: ".event-link"
    date: ".event-date"
    location: ".event-location"
  politeness_delay: 3.0
  max_pages: 3
  respect_robots: true
poll_cadence: weekly
signal_type:
  - network
  - conference
  - events
audience_tags:
  - hardcore_tech
  - tech_writer
relevance_tags:
  - conference
  - events
  - ai
  - network
  - speaking
pre_filter:
  min_engagement: 1
  recency_window_days: 90
  dedup_key: title_url
priority: 4
fragility_tier: fragile
staleness_threshold_days: 14