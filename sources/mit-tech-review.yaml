id: mit-tech-review
name: "MIT Technology Review"
description: "AI research breakthroughs and technology analysis"
type: rss
enabled: true

config:
  endpoint: "https://www.technologyreview.com/feed/"
  method: "GET"
  headers:
    User-Agent: "Radar/1.0"

signal_type: ["capability", "trend"]
audience_tags: ["hardcore_tech", "devs_curious_ai"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 3
