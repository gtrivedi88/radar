id: devto-docs
name: "Dev.to Documentation Tag"
description: "Writing and documentation articles from Dev.to developer community"
type: json_api
enabled: true

config:
  endpoint: "https://dev.to/api/articles"
  method: "GET"
  query_params:
    tag: "writing"
    top: 7
    per_page: 20
  headers:
    User-Agent: "Radar/1.0"
  field_map:
    title: ["title"]
    url: ["url"]
    score: ["positive_reactions_count", "public_reactions_count"]
    comments: ["comments_count"]
    timestamp: ["published_timestamp", "published_at"]
    content: ["description"]

signal_type: ["trend", "news"]
audience_tags: ["tech_writer", "devs_curious_ai"]
relevance_tags: ["documentation", "technical-writing", "api-docs", "developer-experience"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
poll_cadence: "daily"
auth_required: false
