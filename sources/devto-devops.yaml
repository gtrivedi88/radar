id: devto-devops
name: "Dev.to DevOps Tag"
description: "DevOps, CI/CD, and developer workflow articles — catches AI+workflow intersection"
type: json_api
enabled: true

config:
  endpoint: "https://dev.to/api/articles"
  method: "GET"
  query_params:
    tag: "devops"
    top: 7
    per_page: 20
  headers:
    User-Agent: "Radar/1.0"
  field_map:
    title: ["title"]
    url: ["url"]
    score: ["positive_reactions_count", "public_reactions_count"]
    comments: ["comments_count"]
    timestamp: ["published_timestamp", "published_at"]
    content: ["description"]

signal_type: ["trend", "news"]
audience_tags: ["devs_curious_ai", "hardcore_tech"]
relevance_tags: ["devops", "ci-cd", "automation", "workflows", "tooling"]

pre_filter:
  min_engagement: 3
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
poll_cadence: "daily"
auth_required: false
