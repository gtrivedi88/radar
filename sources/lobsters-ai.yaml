id: lobsters-ai
name: "Lobsters AI Tag"
description: "AI-tagged stories from the curated Lobsters community"
type: rss
enabled: true

config:
  endpoint: "https://lobste.rs/t/ai.rss"
  method: "GET"
  headers:
    User-Agent: "Radar/1.0"

signal_type: ["trend", "capability"]
audience_tags: ["hardcore_tech", "devs_curious_ai"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
