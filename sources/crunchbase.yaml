id: crunchbase
name: "Crunchbase News"
description: "Startup funding rounds and venture capital trends"
type: rss
enabled: true

config:
  endpoint: "https://news.crunchbase.com/feed/"
  method: "GET"
  headers:
    User-Agent: "Radar/1.0"

signal_type: ["market_signal"]
audience_tags: ["devs_curious_ai"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
