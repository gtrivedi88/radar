id: lastweek-ai
name: "Last Week in AI"
description: "Comprehensive weekly AI news roundup"
type: rss
enabled: true

config:
  endpoint: "https://lastweekin.ai/feed"
  method: "GET"
  headers:
    User-Agent: "Radar/1.0"

signal_type: ["news", "trend"]
audience_tags: ["devs_curious_ai"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
