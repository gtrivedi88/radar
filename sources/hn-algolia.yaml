id: hn-algolia
name: "Hacker News Algolia API"
description: "Front page stories from Hacker News"
type: json_api
enabled: true
max_items: 30

config:
  endpoint: "https://hn.algolia.com/api/v1/search"
  method: "GET"
  query_params:
    tags: "front_page"
    hitsPerPage: 20
  headers:
    User-Agent: "Radar/1.0"
  results_key: "hits"

# Signal classification
signal_type: ["news", "trend"]
audience_tags: ["devs_curious_ai", "hardcore_tech"]
relevance_tags: ["technology", "startups", "programming"]

# Pre-filtering
pre_filter:
  min_engagement: 10  # minimum points/score
  recency_window_hours: 48
  dedup_key: "url"

# Metadata
priority: 1  # 1=highest, 5=lowest
poll_cadence: "daily"
auth_required: false