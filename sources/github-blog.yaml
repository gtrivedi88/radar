id: github-blog
name: "GitHub Blog"
type: rss
enabled: true

config:
  endpoint: "https://github.blog/feed/"
  method: "GET"
  headers:
    User-Agent: "Radar/1.0"

signal_type: ["capability", "news"]
audience_tags: ["devs_curious_ai", "hardcore_tech"]

pre_filter:
  min_engagement: 0
  recency_window_hours: 168
  dedup_key: "url"

priority: 2
