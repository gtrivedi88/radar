id: hn-algolia
name: Hacker News (Algolia, front page)
type: json_api
config:
  endpoint: https://hn.algolia.com/api/v1/search
  query_params:
    tags: front_page
    hitsPerPage: 50
poll_cadence: daily
signal_type:
  - news
  - capability
audience_tags:
  - hardcore_tech
  - devs_curious_ai
relevance_tags:
  - hn
  - hacker_news
pre_filter:
  min_engagement: 20
  recency_window_days: 14
  dedup_key: title_url
priority: 1
fragility_tier: stable
staleness_threshold_days: 14